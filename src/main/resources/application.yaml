spring:
  application:
    name: All Pad
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://mariadb:3306/allpad?createDatabaseIfNotExist=true
    username: root
  jpa:
    hibernate:
      database-platform: org.hibernate.dialect.MariaDBDialect
      ddl-auto: update
    properties:
      hibernate:
        batch_versioned_data: true
        format_sql: true
        generate_statistics: false
        jdbc:
          batch_size: 2
        order_inserts: true
        order_updates: true
    show_sql: true
management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: "*"
  endpoint:
    shutdown:
      enabled: true
logging:
  level:
    io.allpad: INFO
    org.springframework.boot.actuator.autoconfigure.opentelemetry: DEBUG
  pattern:
    console: "%yellow(%d{yyyy-MM-dd HH:mm:ss.SSSZZZZZ}) %highlight(%-5level) ${PID:-} --- %red([${spring.application.name}]) %magenta([%thread]) %cyan([%X{traceId:-}-%X{spanId:-}]) %logger : %msg %n"
jwt:
  secret: REPLACE_FOR_THE_REAL_JWT_SECRET
  reset-password-expiration: 900000 # -> 15 minutes
  access-token-expiration: 600000 # -> 10 minutes
  refresh-token-expiration: 86400000 # -> 1 days
stripe:
  secret-key: REPLACE_FOR_THE_REAL_STRIPE_API_KEY
  public-key: REPLACE_FOR_THE_REAL_STRIPE_PUBLIC_KEY
  webhook-secret: REPLACE_FOR_THE_REAL_STRIPE_WEBHOOK_SECRET
mercadopago:
  access-token: REPLACE_FOR_THE_REAL_MP_ACCESS_TOKEN
  public-key: REPLACE_FOR_THE_REAL_MP_PUBLIC_KEY
  webhook-secret: REPLACE_FOR_THE_REAL_MP_WEBHOOK_SECRET
  preapproval-plan-basic-id: 34ae40e6f4154851b9409ba1f92b2d1f
  preapproval-plan-standard-id: be499d67cc7a4090917330fa3be77973
  preapproval-plan-premium-id: 81ef56979c3a47c7a6b5aea5cc638591
piston:
  url: REPLACE_FOR_THE_REAL_URL
  user: REPLACE_FOR_THE_REAL_USER
  password: REPLACE_FOR_THE_REAL_PASSWORD
springdoc:
  api-docs:
    path: /v3/v1/api-docs