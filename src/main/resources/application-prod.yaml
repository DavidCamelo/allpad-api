spring:
  cache:
    type: redis
  data:
    redis:
      host: redis
      port: 6379
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: http://opentelemetry:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://opentelemetry:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://opentelemetry:4318/v1/logs