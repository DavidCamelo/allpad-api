apiVersion: apps/v1
kind: Deployment
metadata:
  name: allpad-api
  labels:
    app: allpad-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allpad-api
  template:
    metadata:
      labels:
        app: allpad-api
    spec:
      containers:
        - name: allpad-api
          image: davidcamelo/allpad-api:main
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-pass
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret-key
                  key: secret
            - name: STRIPE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-public-key
                  key: secret
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-webhook-secret
                  key: secret
            - name: PISTON_URL
              valueFrom:
                secretKeyRef:
                  name: piston-url
                  key: secret
            - name: PISTON_USER
              valueFrom:
                secretKeyRef:
                  name: piston-user
                  key: secret
            - name: PISTON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: piston-password
                  key: secret
            - name: SPRING_JPA_SHOW_SQL
              value: "false"